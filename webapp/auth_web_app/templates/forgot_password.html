{% extends "base.html" %}
{% block title %}Mot de passe oublié | SecureAuth{% endblock %}
{% block content %}
<section class="panel-grid single">
    <form class="card form-card" method="post">
        <h1>Mot de passe oublié</h1>
        <p style="color: var(--muted);">Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
        <label>Adresse email
            <input type="email" name="email" required placeholder="votre@email.com">
        </label>
        <button class="button button-primary" type="submit">Envoyer le lien</button>
        <a href="{{ url_for('login') }}" style="text-align:center; color: var(--muted); font-size: 0.9rem;">← Retour à la connexion</a>
    </form>
</section>
{% endblock %}
