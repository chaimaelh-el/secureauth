{% extends "base.html" %}
{% block title %}Connexion | SecureAuth{% endblock %}
{% block content %}
<section class="panel-grid single">
    <form class="card form-card" method="post">
        <h1>Connexion</h1>
        <label>Nom d'utilisateur
            <input type="text" name="username" required>
        </label>
        <label>Mot de passe
            <div class="password-field">
                <input id="login-password-input" type="password" name="password" required>
                <button
                    class="password-toggle"
                    type="button"
                    data-password-toggle
                    aria-label="Afficher le mot de passe"
                    aria-pressed="false"
                >
                    <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" style="display:none">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a10.07 10.07 0 0 1 2.06-3.06"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a10.07 10.07 0 0 1-1.64 2.29"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
                    <span class="eye-icon" aria-hidden="true"></span>
                </button>
            </div>
        </label>

        <button class="button button-primary" type="submit">Verifier et generer OTP</button>
    </form>
</section>
{% endblock %}
